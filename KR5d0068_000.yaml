body:
  text: 海客論别五海客李光元渤海人也少孤而家財巨萬洎弱冠隨鄉人舟往來於青社淮浙為商賈後却過海而同舟有一道人問子曰君家有何人及貨産涉海何為者也曰少孤兄弟貨財及萬道人曰既若如此更涉風波以貪其利漫漫大海浩浩長波一旦傾危魚龍得便甚非所知也光元曰我非為利而涉風波緣思世間皆若夢耳朝露豈可久留還同電光瞥然即滅舊冢未乾新墳相次纍金遍地全不關身積玉倚天豈能留命是以經涉海浪直入中華尋訪真人達士欲將何術可延其生既無所逢遇遂且歸鄉即非為利也道人曰君方年少正貪愛欲榮華早慕修真以延身命可謂奇器矣又何愁仙分而登真也光元曰蚯蚓之質豈能成龍斥鷃之微應難及鳳非敢望其大悟僅得修身之術以延其生斯可矣儻高人不以不肖少垂誨焉幸亦甚矣道人曰金丹大藥未遇至人保命延年斯得其㫖金丹只在身中更無别藥爾能遠離房室去濁澄清枕石潄流祛煩就靜元氣不散可以長生夫元氣者身中混元之氣也是人之基命之根念住即氣停神安即氣定是以智人息是非絶聲色喘息不由於鼻外思惟只在於身中三田得寶長生可保更有納新吐故潄液咽津悉是延年皆為固身之道故古歌曰氣是添年藥津為續命芝世上謾忙兼謾走不知求己更求誰此可明也光元曰高人儀貌有異必此驗乎曰我行此道遂得如斯今已百歲矣疾病未嘗染也光元再拜而謝曰不肖得聞大道何其幸也若非夙緣無由覩此道人到東岸下船欲遊新羅遂相告别光元歸渤海乃依行此道不顧浮華乃往長雲島中修行數年固有益驗因彼往來時人號之曰海客光元後復思人間更有出世之門金丹玉液之道止居此中何由而達中華甚有名山諸方聖境乃幡然捨島而遊名山以尋其事也己巳年八月三日至嵩高山少室中於僧舍止宿十餘日後獨步南登看玩嵒谷行五六里忽於路側松下遇一人年老携笻笻有三瓢短褐長巾於人有異遂問光元曰子在此何為光元曰無他看玩山水耳子從何來光元曰十年從海來歷遊名山乃至于此有何事也曰少孤家財巨萬每笑榮貴不戀繁華惟求妙道乃至于此曰求道幾年有所遇乎光元曰海內遊歷二十餘年數年前於船中遇一道人教以保養精氣導引四肢依而行之亦有其驗曰如斯則道成矣夫復何求光元曰竊聞神仙之道更有金液及還丹之術慮恐虛度年華是以竊心尋訪也曰所求金液還丹曾遇否乎光元曰求之十年未有所遇老人微笑曰識吾否曰愚蠢不識高人也曰我是元壽先生又曰子何姓曰姓李名光元老人又笑曰我號元壽子名光元與我相符我得人矣又曰子求金丹之道將為人乎為己乎光元曰既能為己亦將提拔有分之人先生曰斯可傳矣若為一身神仙非許光元乃再拜而謝之先生曰子若非夙分雖加辛勞沒世亦不遇也子仙骨已彰神基漸就子誠聽吾說焉乃放杖坐石更指光元令坐光元曰先生欲傳至道不肖得無禮耶先生曰至道無逺盡此一日論說可終其奧不可令子久立也光元乃拜而坐先生曰還丹者非是别藥真一為基鉛汞相依黃芽是本乃可成也光元曰亦見時人論黃芽皆不知其至理不知黃芽將何物制造得成也曰鉛出鉛中方為至寶汞傳金氣乃號黃芽不見古歌云黃芽鉛汞造陰殼含陽花不得黃芽理還丹應路賒世人鍊至藥盡認是黃華鉛黃是死物那得到仙家黃芽非在藥內象取精華若到黃芽地金銀徒爾誇此之謂也光元曰竊見金玉五相類云鉛有大毒爭堪成就至藥曰雖有大毒蓋為世人不解取用譬如世上毒藥非一若巴豆之類豈無毒也若解用之即能治病鉛亦如是故陶植篇云鉛中有金金中有寶賢人得之寧修鉛中金不鍊金中寶此非世間鉛也世人直下用鉛希求黃芽萬無一得蓋不識不知鉛也光元曰鉛有二耶曰鉛非有二譬如養子若割父母身上肉內於腹中而孩子生應難得若離父母孩子自何而生古歌云鼎鼎元無鼎藥藥元無藥黃芽不用鉛須用鉛中作黃芽是黃芽鉛去鉛萬里黃芽非黃芽却向鉛而始鉛為芽父芽為鉛子子隱母胎母隱子胞知白守黑神明自來此之謂也故諸經唯讚鉛之功能若捨其鉛如棄父母求子也古歌云莫壞我鉛令我命全莫破我車令我還家鉛斷河車空所作必無功鉛破河車絶所作無處出又云白金公巍巍立始初又云一物含五彩又陶植篇云五彩之合道契自然故生天地為牝為牡然後還日之精於月窟結精華於中氣紫霜潜與真合符若非神仙莫能窺也人不曉不解用之遂使差之毫釐失之千里故歌云用鉛不用鉛須用鉛中作世人若用鉛用鉛還是錯又歌云用鉛不得用凡鉛用鉛鉛是舊丹田此並明不棄鉛而解用之也用之則陰陽得序忤之則夫婦相違只在鉛中而研究之達也元陽子歌曰真陰真陽是真道只在目前何遠討凡流歲歲燒神丹忽見青黃自云好志士應須求法則勿損精神虛顛倒但能求得真黃芽人若服之壽無老此可知也光元曰切見世人云硃砂水銀是黃芽是何理也曰此非至人之言且硃砂水銀者無定性自無身形陰不自生女無自孕故李西蟾篇云硃砂水銀同一處二女終是不相知自立既難安可得成大道夫黃芽者坎離相孕金水相生男冠女笄牝牡相從從無入有陰動陽交方可得成契於至理故陰真君歌云北方正氣為河車東方甲乙為金砂兩惰含養歸一體朱雀調運生金花金花能生天地寶人會此言真至道此可知也光元曰又見世人以金為黃芽以銀為黃芽坑朱砂粉根取銀為黃芽或以錫為黃芽草節鉛金銚鉛枯鉛等為黃芽或以蜜陀僧黃丹鉛黃花等為黃芽是何理也曰此並非也諸類皆是朴質之物頑滯之徒鍊之則色悴形枯燒之則塵非土變枯骨死肉終亦何為孤陰寡陽爭同至化服之則灼人臟腑餌之乃促彼生年豈及於黃芽叶於大道夫黃芽者鉛汞合體金木相并龍虎相交水火相制推惰合性以𩱿隨𩲸成還返之用明呼吸之理乃得陽交陰孕母在子全得天地之精成混元之道古歌云汞不呈璞金不露形又曰丹砂木精得金乃并又曰龍來身斂魂充飢虎來啖食生髓脂乃可明矣光元曰黃芽既云鉛汞所造金水相生愚意尚迷而未曉末知若何得成曰譬如人間種植世上田農果子初生犂墾以選好地及彼良時仍賴風雨調勻節候催促年終稼穡盡獲收成黃芽之因亦復如是合和鉛汞配類坎離水火相仍時候周足自然和合變化無有比倫黃芽若成大道全矣歌云鉛黃芽同三華採我氣結成砂初間日運如火輸五彩潜藏入神華魯為使作道無邪三者既備是仙家此可知也光元曰黃芽既得聞命矣至藥如何得成敢請其㫖曰至藥唯用五行更無雜物若有諸類不成至藥古歌云捉取東青龍配與西白虎更將南朱雀會偶北玄武就中尤妙處莫失中央土此可知也此五行是鉛本類乃得成丹若有非類即不成也譬如一家父母夫婦無有外人鉛汞五行亦復如是制伏成藥骨肉精氣血脉皆全方堪服餌古歌云何言金木水火土留身保命是龍虎學人不識五行精强認他人為父母木主氣兮骨主虎血主水兮肉主土不死之道在離宫會得五行身有主五行須是水銀親外質不堪為伴侣又賀蘭球本歌曰青龍起白虎卧玄武飛朱雀坐黃龍中央自結果母憐子子憐母爐中結成雲一朵餌服刀圭無不可此之道也光元曰大藥雖是龍虎制伏五行真氣成藥餌服之時最是何物曰成藥只是一味水銀雖神水之胎作紫金之粉巳含五彩巳表五行成身號曰金液還丹太古神仙皆同一法古歌云水銀一味是仙藥從上流傳伏火難若遇河車成紫粉紫粉一時化金丹金丹正法本無鉤水銀一味獨難幽刀圭點化將為驗服之不死泛仙舟又歌云却取抽成汞還燒反作砂胎中受五彩月足是黃芽迷途不可見對面隔天涯若到河車地只此是仙家可明也光元曰服火水銀若成藥自古已來亦有硃砂水銀伏火者不少因何服食皆不延年及點化之間亦無使用此何也曰此皆不得神仙之妙術不按經書之理不得五行制度不得日月精華或因諸類相和或與至真違逺縱得千斤伏火亦與瓦石一般非惟點化無堪亦且服食夭壽故王真人傳云古有兄弟二人將水銀一斤於陽山修鍊三年伏火如紅玻瓈色謂是至藥兄弟二人各服半斤六月便衣綿衣行又要人扶策此則皆是希望延年反有墜身豈非藥類之不同方術之錯誤此既可驗竊見求真若得真方萬不失一既黃芽是大藥之本藥是五行之所成並曉真元可知出世未委幾何分兩燒制何時乃可成就敢請其方曰神仙至藥分兩爭無大道金丹燒成有節不惟爐作器象亦且鼎有乾坤火從子以為初須明卦兆復從離而終亥始見光華亦同子在胎中直須月滿雞居卵內須要日周分兩則二八同居節候則一星周匝方可龍興雲雨虎嘯山巖自延世上之年不是人間死物歌云二八姹女十六鉛精陽生起火陰盡須停星辰周匝至藥通靈又陶隱居望江南云長生藥本是五行作子午二門開卯酉四時運火合乾坤龍虎自相吞此之謂也光元曰大丹恭聞命矣又見諸書所云日𩱿月𩲸白虎青龍丹砂河車真鉛正汞名字不少疑惑人心未審此中誰為正號敢問其由曰多般多號皆是一塗日𩱿即是陽精月𩲸還歸陰體青龍是木豈離東方白虎為金還居西面河車金液是仙人得意之名正汞真鉛乃達士當時之號但令消息何用遲疑不越五行更無别理光元曰又見黃帝陰符經云還丹之術百數其要在神水華池華池之內至神至妙故黃帝遇此而升真馬明因兹而得道華池之理亦在五行前章之中具陳仔細故元陽子歌曰神水華池世所稀流傳不許俗人知世上若將凡鉛汞相似教人永不疑光元曰見諸丹經云三五與一天地至精未委此言是何事也曰前章備陳三五一者亦是五行且非别物爾更研究必達根元不見古歌云陰坎徒迷一陽離五彩形欲知三處所偏抱木之靈鍊藥先通訣仍須詣古經瓊丹君若畢天駕五雲軿光元曰世上諸藥何止萬般唯金液還丹即得延年保壽及至升真何也曰爾之愚鈍猶不知之且世上之人無不禀於五行而生至於心肝脾肺腎臟豈離陰陽五行曉五行之精合萬象之精光透得紫金之妙用流津成華池之名服之豈不保固四肢堅牢五臟自然長生有地去世成因若在目前迷人但執古歌云金砂入五內霧散若風雨薰蒸達四肢顔色悅懌好老翁復丁壯耆嫗成姹女髮白又再黑更生異牙齒號之曰真人石藥者五行不録生服則毒損人藏腑伏火則與瓦礫何殊止可醫治小病寧比於大丹事理皎然真源不昧草木為藥者四時雕變自不固於霜雪萬味相和只可治其風濕尤不可比於大丹也光元曰金丹服之長壽乃至升仙未委世間更有何用先生曰迷人迷人金丹大藥豈無所用此丹一年滿足十月周圓開罏而紫粉成金啓鼎而黃芽散耀包含五彩聚集百靈先將點化水銀立成黃金始驗服食之後永固筋骨濟命濟家非虛言也古歌云丹砂丹砂能濟我命能濟我家又陶隱居望江南云十月滿開鼎一團紅數片殘霜含五彩解胎神水響玲瓏氣馥異香濃此可知也光元曰水銀除此黃芽外更有何藥得成寶物曰除此黃芽無藥可也光元曰諸藥何為制得曰制得者水銀水銀者天地之精五金之𩲸性流利而不染諸雜故俗言水銀無假也諸物焉能入得黃芽黃芽者體是水銀感五行之精而成故捨此即不成也世人多用藥以至窮日盡力尋求礬石之精不逺千里而行縱然求得終無所成勞思焦心倐歸泉土可不悲哉皆由不曉藥之性情不知藥之類聚且礬之與石不與金同水銀既是金𩲸石藥因何得入而成其金故歌曰金可作世可度金不作徒自誤此不虛矣大樂只在目前人自不知必欲礬石為之亦猶上山求魚入海網兔何可得也光元曰世人或以五金為匱伏制水銀亦是經年必無所成是何事也曰五金者人世質物亦與至藥不同黃芽篇中具陳仔細且術有幽祕道有玄微皆須口傳心授方可成丹世人妄憑泛說專按古方亂制水銀欲求大事殊不知五行含孕如妊婦之懷胎鉛汞相須若晨雞之抱卵至于妙道通于神明毫釐有差陰陽失序故陶隱居望江南云還丹訣妙術口相傳若信古方應自誤顛來倒去枉燒錢不得怨神仙又菩薩蠻云家家盡有長生藥時人取用皆差錯氣候尚浮沉問君何處尋眼看猶不識誤向鉛中覓此物沒黃芽徒勞歲月賒細看此理即可明也光元曰四黃八石全無大道之理不與水銀合同而硫黃又能立制水銀成砂是何理也曰水銀者正陰硫黃者假陽正氣被假陽所制終始相依此陰陽之大理且硫黃者是礬之液礬者鐵之津磁石鐵之母故針砂磁石伏制硫黃立成雲粉此一根也硫黃即為鐵之孫裔水銀本是金之精𩱿二氣雖暫相和終無成事但細窮理路可見根源光元曰諸礬制伏水銀不得亦不與水銀相和又見碌礬和鹽制水銀成粉成霜是何理也曰水銀者金之𩲸𩱿碌礬者鐵之精華論五金則二氣同根議鉛汞則銅鐵殊逺是以暫制水銀成粉亦無大功亦如飛燒砒黃上覆其鹽即白若無鹽其色不白悉皆小事非關大道爾但窮究永除他慮也古經云飛鼠繼汞河車伏汞若有雜物無因得成古歌云河上姹女靈而最神見火即飛不染垢塵鬼匿龍隱莫知所存欲得制他黃芽是根此可知也光元曰世人不曉鉛汞不識五行將四黃以制水銀將八石以成至藥硇礬雌雄之類無不遍尋磁砒膽碌之徒悉皆入用指神符霜於黑錫認聖無知作青鹽火煅千回水飛萬遍或三年守鼎五載臨罏皆無所成虛勞神思但恐神仙未知諸礬之中還有人制得水銀否敢請其略曰世間萬事乃至纖毫未有不因理例相依種類相取可不明之夫水銀者是金之魂魄精華也與鉛同根與水同體五行相孕金水相生得氣轉華方乃成其至藥轉至水銀萬變千通世無比類故陶植篇云金為水母母隱子胎水者金子子藏母胞此言金水自含孕竊犢於母中須化集而成又長子繼父體因母立兆基此言砂産於金汞流為子以金養汞繼體而榮道合自然事根至妙不可以知不可以思若因礬石雜類之藥則形體全乖祖宗並失還返無由而得但若雀雞同窠猫鼠共穴將漆補釜以菵塗瘡非唯無益而又損焉歌云世人好假不好真並將石藥和水銀姹女化歸煙露散只留磁譽自相親硇礬碌膽傾家産多信狂徒疏作親不遇神仙談至理終歸白首得無因此可知也且石藥大約七十二件太古聖人盡别酸鹹著在方論只可治諸疾辟邪沴不關造化不合五行假令别得元方窮極妙制亦是暫留鬚鬢豈得同成筋骨世間迷謬亂傳方術誣誑神仙漫將礬石以同鉛汞研以柳磓和以棗葉煮以醋蜜飛以水酒未嘗有成虛度光景言固濟則鐵石非堅說覆藉則尋莫延及三年滿足已化成塵却云雞犬來衝龍蛇變去殊不知大道之理漫怨天而尤人若此之流世間非一更有用盡石中海內諸藥罄竭資産精意轉迷可不悲哉光元曰世人取桑柴灰煎鍊以制砂汞古歌云龍居震位四十八是桑字又歌云採於蠶食之前用乎火化之後此皆大藥之根未知果然也曰大藥之本前已具陳且用桑灰等皆是迷人所作愚者所陳遞互相承一無所就真人歌言龍居震位四十八者自是至藥分兩方位之號非桑字也凡流不達妄認虛無似鹿逐羊如猿探月何可得也大藥者純用五行更無别藥礬石相雜猶且不成桑柴之徒何其逺矣故參同云狐不乳馬燕不生鳳也光元曰世人多取窟突中烟礦云是木之精配青龍之位元陽子歌云要識丹砂是木精移來西位與金并迷人何處尋龍虎恍惚之間在杳冥言此是也復覓鄜州井鹽或以太陰元精石配白虎之象正真龍虎之道大丹之元此理如何曰甚哉子之難悟也至真之道匪遙時人不識愚智相沿良可痛也夫至藥活利之物變化之身上祕仙籍下延人壽得之者五行自曉遇之者萬象長明金丹一成貧病俱失具煙礦元精之類是世上死物瓦礫無殊服之則血脉不生鍊之則精神轉悴將何變化得成大丹理在目前昧者自誤元陽子歌言真龍真虎之道豈烟礦之徒元陽子素是真人何昧若是也且真龍真虎者是還丹之體鉛汞之心神仙悉陳經書明論虛妄之人錯亂益甚故金丹銘云丹砂其位元非赤四季排來在南宅位屬南方丙丁火其形赤抽取砂中水銀配屬東方甲乙木其形青龍之象黑鉛本性元非黑其為內含抱五德配屬北方壬癸水其形黑抽取砂中精屬西方庚辛金其形白白虎之象也歌曰五行不順行虎向水中生五行顛倒術龍從火裏出又金丹賦云火東轉以成龍水西旋而為虎又李栖蟾云太陰在南宅太陽在北宅火之木曰汞水之金曰鉛制在中宫氣以類助並是發揚龍虎證驗神丹言以烟礦之徒元精之類豈得同此耶更宜思究萬無一差若信迷人徒自苦耳光元曰先生所說大丹之道盡已光元竊聞昔淮南劉王鍊秋石以成至藥服食冲天未知秋石是何物也又見丹記多識聖無知之號世人云青鹽未知果然耶曰淮王鍊秋石者亦是大丹更無别理還如一物而有數名聖人臨時各隨意以安其號緣金虎者是大丹之本其色凝白屬西方西方至秋故得其號亦猶河車黃芽其一類也聖無知者亦是丹砂心髓鉛汞深門當五行制伏之時自生肌骨及萬象包羅之日血脉皆全仙人尋而不知聖人思而不得故得其號豈是青鹽迷人悮矣光元曰大丹之道神矣妙矣何仙始知也曰金者水子汞者金𩱿與五行雖是根源歷萬載不能合體有陵陽子眀者太初真哲與上古仙人知此歸源必有祕道故將南與北以西配東配此四方不遺中道一年運火十月開爐七返無虧九還周足乃得飛𩱿伏體走𩲸歸家故號紫金火液大還神丹歌云九還七返三五一龍虎相交入神室灰池焰灼天地精金液還丹功及畢光元曰大丹之道恭聞命矣世人多將草藥至於赤芹葛苣章柳含松皆採而用地膽裂汁田翁除根銀莧馬齒莧相兼龍腦兔絲並使結為砂子以望黃金如此之人如麻似葦未知有成耶曰人雖一類愚智萬般所禀不同所成各異智者暗通域內愚者不見掌中亦由雲氣生而上天瓦礫生而在地雲氣抑之不住瓦礫舉而不升愚智亦然改换非可且汞者積陰之氣元水之精遇萬歲以成形與五金而作𩲸重於金體潔不許塵悉在目前有何難覩草藥者春生夏長秋落冬殘枝葉匪堅根莖不永裂之成水燒之成灰若將結汞天高地逺矣足認無知苟利之輩誑惑時人豈有成事居河北指三昊有草在嶺南云兩蜀得成盡是虛傳皆無實理相承既遠訛謬堪悲智者自明愚人不達光元曰未知草結砂子終或有之曰兔角長短龜毛幾何曰兔無角龜無毛曰草結砂子何異此也光元曰草砂既無世上多說三黃一匱以草砂罨成黃金何也曰三黃體與水銀又見飛走將何以制得成金生制即為煙燼伏火又如瓦礫别無變化母既瓦礫令子成金銀非理也亦如世上飛者即生雌雄走者即生牝牡螻蟻蟲魚並皆如是三黃一匱砂草豈得成事若是有成只以金結又且何妨况金是本根成了非失到底不合造化遺彼丹經終無所成故指草也且草砂從古至今只是鬼名有同向水求塵鑽冰覓火令蟬乳鳳使鶴懷蛇石藥尚自不同草則因何得入遞傳虛事妄使搜尋嶺北嶺南海外海內巧論枝葉廣說酸鹹到底害其己身石崇由此而滅家梁冀因兹而覆族但要多途營運百計希求自然得濟貧寒無至飢闕豈在須尋無母砂子以作金銀苟利已深與道千逺且神仙以藥制造金銀豈須無母砂子視榮貴如泥土金寶非有愛也至於變化些小以表藥功乃濟飢貧非沽嗜欲以滅其身也凡流必將無母砂子欲成金銀是亦大迷且無母砂子燒之不住飛走如神與生汞相較幾何無成至終虛妄智者聞而曉悟愚者執而髮白覓舞之蛇解飛之鱉可不悲歟光元曰又見世人將無母砂子欲成金銀皆罄資財終無所就此理如何曰此非好道之人皆是競財之輩夫道希夷為本寂湛為基節嗜欲以居山去貪婪而處世存神養氣食柏餐松方乃漸至清涼稍達真境其金銀世間之物暫濟浮生有分則不求自來無分則求之不得散則彰其德行聚則更宜熟思無自迷謬先生復問何謂無母砂子光元曰無有母只是水銀先生大笑曰必要生金銀且有母砂子何妨母是金銀汞歸母體豈非理耶若必無母則世間硃砂靈砂粉霜輕粉及諸感氣之類亦是水銀結成無有五金可不同于無母砂子乎爾記吾所說免為時人捕影矣光元曰恭聞命矣未知世間諸草還有延年出世否乎先生曰諸名草藥亦有延年子不見十洲記神仙傳中極有出世之事也若乃靈芝挺秀朱草呈妍黃精白术之徒赤箭茯苓之類桃花杏仁柏葉松子悉堪修事皆在方書亦有煮白石以充飢煉元精而度世此皆方外之士山野奇人絶粒數年修真纍歲故得內外相應服草有功豈不是延年出世耶爾凡流者不知至道貪愛不休惟積玉堆金是為世樂恣驕奢侈亹亹相矜無一日不間滋味無一日不顧綺羅七竅長流三田不固任是萬般靈藥餌服何為豈能出世也子依吾說大道匪遙真境必達光元曰偶因登玩獲遇真人不外凡愚幽玄盡付恩深天地匪言可酬今欲營其藥類擬入名山燒制未知可乎曰此道至大至神子宜至保若漏天機不惟殃爾七祖即滅爾身切在祕藏勿與非人言論交遊也此山雖是名嶽且近大都今值兵革方興此山當道多人竄伏不可制造神丹昊越江浙名山甚多或羅浮茅嶺廬嶽天台目下並安後亦無事乃是羣賢栖依之地衆聖所遊之方子宜往彼以制大丹定是出世吾之所論悉無謬辭子宜祕保光元曰恩深渤海荷重丘山一介微人將何以報曰爾之有分濟會如兹吾見世人擾擾悉貪榮祿盡愛繁華喪朴俄然皆死吾甚悼此輩也將吾所論録成方册接引有分之人即是報吾吾亦願也光元感極默爾無言先生曰子久於海上曾飲元酒否曰不識元酒先生遂解杖頭瓢與光元汲水先生以藥投瓢中木葉蓋之逡巡成酒紅紫色香味非常先生自飲一杯餘令光元併飲訖精神頓爽乃再拜而謝之先生指曰日已暮汝且歸吾所止只在峰南無事却來言訖遂行片雲瞥然蹤跡已失光元遂歸寺舍明曰直過峰南以尋先生徑路皆迷洎至峰南全無徑路白雲飛烏澗水猿聲而已殊不見人乃知先生非居凡也悵恨再三謹録以成一卷達士君子幸細詳之也海客論
